services:
  - type: web
    name: shanghai-optagent-platform
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
