name: Publish static site to gh-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare static files
        run: |
          mkdir -p ../pages
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='mapbox_sources' \
            --exclude='mapbox_mbtiles' \
            --exclude='mapbox_studio_upload' \
            ./ ../pages/
          touch ../pages/.nojekyll
      - name: Publish branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd ../pages
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
      - name: Ensure GitHub Pages site
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          STATUS="$(curl -L -s -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}")"
          if [ "${STATUS}" = "200" ]; then
            METHOD="PUT"
          else
            METHOD="POST"
          fi
          curl --fail-with-body -L \
            -X "${METHOD}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}" \
            -d '{"source":{"branch":"gh-pages","path":"/"},"build_type":"legacy"}'
          curl --fail-with-body -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${API}"
